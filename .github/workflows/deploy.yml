name: Deploy to S3 and CloudFront

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      
      - name: Sync HTML files to S3
        run: |
          aws s3 cp website/ s3://j22southwest.org/ \
            --recursive \
            --exclude "*" \
            --include "*.html" \
            --content-type "text/html" \
            --cache-control "max-age=300" \
            --metadata-directive REPLACE
      
      - name: Sync CSS files to S3
        run: |
          aws s3 sync website/css/ s3://j22southwest.org/css/ \
            --content-type "text/css" \
            --cache-control "max-age=86400" \
            --metadata-directive REPLACE
      
      - name: Sync images to S3
        run: |
          aws s3 sync website/images/ s3://j22southwest.org/images/ \
            --cache-control "max-age=86400" \
            --delete
      
      - name: Sync other files to S3
        run: |
          aws s3 sync website/ s3://j22southwest.org/ \
            --exclude "*.html" \
            --exclude "css/*" \
            --exclude "images/*" \
            --exclude ".DS_Store" \
            --cache-control "max-age=3600" \
            --delete
      
      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id E9651Z369JQUC \
            --paths "/*"
      
      - name: Deployment summary
        run: |
          echo "✅ Website deployed successfully!"
          echo "URL: https://j22southwest.org"
          echo "CloudFront invalidation in progress..."
